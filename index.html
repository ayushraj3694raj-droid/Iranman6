DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Gesture Detector 🤚</title>

    <!-- ✅ Correct MediaPipe CDN Links -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #gesture_box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 204, 0.15);
            padding: 12px 28px;
            border-radius: 50px;
            border: 2px solid #00ffcc;
            font-size: 20px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            z-index: 10;
            white-space: nowrap;
            transition: border-color 0.3s, background 0.3s;
            text-shadow: 0 0 10px rgba(0,255,204,0.5);
        }

        #finger_count {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 16px;
            backdrop-filter: blur(6px);
            z-index: 10;
        }

        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0,255,204,0.2);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: #00ffcc;
            font-size: 18px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">⏳ Model load ho raha hai...</div>
        <div style="color:#888; font-size:13px;">Camera permission allow karo</div>
    </div>

    <div class="container">
        <video id="input_video" style="display:none" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="gesture_box">🤚 Haath dikhayein...</div>
        <div id="finger_count">🖐️ Ungliyaan: —</div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gestureBox = document.getElementById('gesture_box');
        const fingerCountBox = document.getElementById('finger_count');
        const loadingScreen = document.getElementById('loading');

        // Canvas size set karo
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Ungliyaan count karne ka logic
        function countFingers(landmarks) {
            const tips = [4, 8, 12, 16, 20];   // Fingertip indices
            const pips = [2, 6, 10, 14, 18];    // Knuckle indices
            let count = 0;

            // Thumb (alag logic - side se check karte hain)
            if (landmarks[4].x < landmarks[3].x) count++; // Right hand ke liye

            // Baaki 4 ungliyaan
            for (let i = 1; i < 5; i++) {
                if (landmarks[tips[i]].y < landmarks[pips[i]].y) count++;
            }
            return count;
        }

        // Gesture detect karne ka logic
        function detectGesture(landmarks, fingerCount) {
            const tip8y = landmarks[8].y, pip6y = landmarks[6].y;   // Index
            const tip12y = landmarks[12].y, pip10y = landmarks[10].y; // Middle

            if (fingerCount === 0) return { text: "👊 Mutthi (Fist)", color: "#ff3366" };
            if (fingerCount === 5) return { text: "✋ Khula Haath (Open)", color: "#00ffcc" };
            if (fingerCount === 1 && tip8y < pip6y) return { text: "☝️ Ek Ungali (Pointing)", color: "#ffcc00" };
            if (fingerCount === 2 && tip8y < pip6y && tip12y < pip10y) return { text: "✌️ Victory / Peace", color: "#66ff66" };
            if (fingerCount === 3) return { text: "🤟 Teen Ungliyaan", color: "#ff9900" };
            if (fingerCount === 4) return { text: "🖖 Chaar Ungliyaan", color: "#cc88ff" };
            return { text: `🖐️ ${fingerCount} Ungliyaan`, color: "#00ffcc" };
        }

        function onResults(results) {
            loadingScreen.style.display = "none";

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Mirror flip for selfie camera
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Mirror coordinates for drawing
                    const mirroredLandmarks = landmarks.map(lm => ({...lm, x: 1 - lm.x}));

                    drawConnectors(canvasCtx, mirroredLandmarks, HAND_CONNECTIONS,
                        {color: '#00ffcc', lineWidth: 3});
                    drawLandmarks(canvasCtx, mirroredLandmarks,
                        {color: '#ff3366', lineWidth: 1, radius: 4});

                    const count = countFingers(landmarks);
                    const gesture = detectGesture(landmarks, count);

                    gestureBox.innerText = gesture.text;
                    gestureBox.style.borderColor = gesture.color;
                    gestureBox.style.background = `${gesture.color}22`;
                    gestureBox.style.textShadow = `0 0 10px ${gesture.color}88`;

                    fingerCountBox.innerText = `🖐️ Ungliyaan: ${count}`;
                }
            } else {
                gestureBox.innerText = "🔍 Haath nahi mila...";
                gestureBox.style.borderColor = "#888";
                gestureBox.style.background = "rgba(128,128,128,0.1)";
                fingerCountBox.innerText = "🖐️ Ungliyaan: —";
            }
        }

        // ✅ Correct locateFile URL
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        camera.start().catch(err => {
            loadingScreen.innerHTML = `
                <div style="color:#ff3366; font-size:20px;">❌ Camera Error</div>
                <div style="color:#888; font-size:14px; margin-top:10px;">${err.message}</div>
                <div style="color:#aaa; font-size:12px; margin-top:8px;">Browser settings mein camera allow karo</div>
            `;
        });
    </script>
</body>
</html>
